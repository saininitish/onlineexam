services:
  - type: web
    name: mock-test-backend
    env: node
    plan: free
    region: ohio
    buildCommand: npm install && cd server && npm install
    startCommand: npx tsx server/src/server.ts
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: FRONTEND_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: REFRESH_SECRET
        sync: false
      - key: GROQ_API_KEY
        sync: false
